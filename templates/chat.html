<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Medical Chatbot</title>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>

    <style>
        body {
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1e2a38, #121826);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            max-width: 850px;
            height: 90vh;
            background: #1f2937;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .chat-header {
            padding: 15px;
            background: #111827;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .msg {
            max-width: 75%;
            padding: 10px 14px;
            margin-bottom: 12px;
            border-radius: 12px;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.5;
        }

        .user-msg {
            background: #22c55e;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }

        .bot-msg {
            background: #3b82f6;
            color: white;
            margin-right: auto;
            border-bottom-left-radius: 2px;
        }

        .input-box {
            display: flex;
            padding: 10px;
            background: #111827;
        }

        .input-box input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        .input-box button {
            margin-left: 10px;
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
        }

        /* Typing animation */
        .typing {
            display: flex;
            gap: 4px;
            padding: 10px 14px;
            background: #3b82f6;
            border-radius: 12px;
            width: fit-content;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.4s infinite both;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0% { opacity: 0.2; transform: translateY(0); }
            20% { opacity: 1; transform: translateY(-3px); }
            100% { opacity: 0.2; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="chat-container">

    <!-- HEADER -->
    <div class="chat-header">
        <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png">
        <div>
            <b>Medical Chatbot</b><br>
            <small>Ask anything about health</small>
        </div>
    </div>

    <!-- CHAT AREA -->
    <div id="chatBox" class="chat-box"></div>

    <!-- INPUT -->
    <div class="input-box">
        <input type="text" id="text" placeholder="Type your message...">
        <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>

</div>

<script>
let typingDiv = null;

function scrollBottom() {
    $("#chatBox").scrollTop($("#chatBox")[0].scrollHeight);
}

function addMessage(text, type) {
    let cls = type === "user" ? "user-msg" : "bot-msg";
    $("#chatBox").append(`<div class="msg ${cls}">${text}</div>`);
    scrollBottom();
}

function showTyping() {
    typingDiv = $(`
        <div class="msg bot-msg typing" id="typing">
            <span></span><span></span><span></span>
        </div>
    `);
    $("#chatBox").append(typingDiv);
    scrollBottom();
}

function removeTyping() {
    if (typingDiv) {
        typingDiv.remove();
        typingDiv = null;
    }
}

function sendMessage() {
    let msg = $("#text").val().trim();
    if (!msg) return;

    addMessage(msg, "user");
    $("#text").val("");

    showTyping();

    $.ajax({
        type: "POST",
        url: "/get",
        data: { msg: msg }
    }).done(function(data) {
        removeTyping();
        addMessage(data.answer, "bot");
    });
}

$("#sendBtn").click(sendMessage);

$("#text").keypress(function(e) {
    if (e.which === 13) sendMessage();
});
</script>

</body>
</html>
